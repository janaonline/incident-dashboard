<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Runs before CSS/paint - prevents a flash of the wrong theme.
    try {
      var t = localStorage.getItem('isd-theme');
      document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>

  <button id="themeToggle" class="theme-toggle" type="button"
          aria-label="Switch to light theme" aria-pressed="false">
    <svg class="theme-toggle__icon icon-moon" viewBox="0 0 24 24" aria-hidden="true" width="20" height="20">
      <path fill="currentColor" d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
    </svg>
    <svg class="theme-toggle__icon icon-sun" viewBox="0 0 24 24" aria-hidden="true" width="20" height="20">
      <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/>
      </g>
    </svg>
  </button>

  <header class="hero" id="hero">
    <div class="hero__media" id="hero-media"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content glass-panel" id="hero-content">
      <h1 class="hero__title kinetic-heading" id="hero-title"></h1>
      <p class="hero__tagline" id="hero-tagline"></p>
      <a class="hero__cta" id="hero-cta"></a>
    </div>
    <div class="hero__scroll-indicator" aria-hidden="true">
      <span class="chevron"></span>
    </div>
  </header>

  <main id="sections">
    <div class="image-stack" id="image-stack" aria-hidden="true"></div>
  </main>

  <footer class="site-footer" id="site-footer">
    <div class="site-footer__rule" aria-hidden="true"></div>
    <p class="site-footer__credit" id="footer-credit"></p>
    <ul class="site-footer__links" id="footer-links"></ul>
  </footer>

  <script src="script.js"></script>
</body>
</html>
